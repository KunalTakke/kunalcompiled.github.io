# ============================================================
# Hugo Build & Deploy to GitHub Pages
# ============================================================
# This workflow runs every time you push to main.
# It installs Hugo, builds your site, and deploys to GitHub Pages.
#
# Think of this like an Airflow DAG with two tasks:
#   build (hugo --minify) >> deploy (upload to Pages)

name: Deploy Hugo Blog

# TRIGGER: when does this pipeline run?
on:
  push:
    branches: ["main"]    # Only on pushes to main (not feature branches)
  workflow_dispatch:       # Also allows manual trigger from GitHub UI

# PERMISSIONS: what can this workflow do?
permissions:
  contents: read           # Can read your repo (to check out code)
  pages: write             # Can write to GitHub Pages
  id-token: write          # Needed for Pages deployment authentication

# CONCURRENCY: prevent overlapping deployments
# If you push twice quickly, the second push cancels the first deploy
concurrency:
  group: "pages"
  cancel-in-progress: false

# DEFAULT SHELL for all steps
defaults:
  run:
    shell: bash

# ============================================================
# JOBS
# ============================================================
jobs:
  # JOB 1: Build the site
  build:
    runs-on: ubuntu-latest
    steps:
      # Step 1: Check out your repo code
      # submodules: recursive pulls in the PaperMod theme
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          # ^ This is critical! Without it, the themes/PaperMod
          # directory will be empty and the build will fail.
          # Remember: PaperMod is a git submodule, not copied files.

      # Step 2: Configure GitHub Pages settings
      - name: Setup Pages
        uses: actions/configure-pages@v4

      # Step 3: Install Hugo
      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v2
        with:
          hugo-version: "latest"
          extended: true
          # ^ "extended" includes Sass/SCSS support
          # PaperMod uses some Sass features

      # Step 4: Build the site
      - name: Build
        run: hugo --minify
        # --minify compresses HTML/CSS/JS output
        # This generates the public/ directory

      # Step 5: Upload the built site as an artifact
      # GitHub Pages deployment needs the site as an "artifact"
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public
          # ^ This is the directory Hugo outputs to

  # JOB 2: Deploy to GitHub Pages
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build            # Wait for build job to complete first
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4